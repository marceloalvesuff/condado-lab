{{ define "main" }}
<section class="pt-32 pb-24">
    <div class="max-w-4xl mx-auto px-6">
        <h1 class="text-5xl font-bold mb-6 text-center">{{ .Title }}</h1>
        {{ with .Content }}
        <div class="text-xl text-slate-400 font-light mb-20 max-w-2xl mx-auto leading-relaxed text-center">
            {{ . }}
        </div>
        {{ end }}

        <div class="space-y-16">
            {{ range .Pages.ByDate.Reverse }}
            <div>
                <div class="flex items-center space-x-4 mb-4">
                    <span class="inline-block px-4 py-2 bg-purple-600 text-white text-xs font-black tracking-widest uppercase rounded-full">{{ .Title }}</span>
                    <div class="flex-1 h-px bg-slate-200"></div>
                </div>
                {{ with .Description }}
                <p class="text-slate-400 text-sm italic mb-8">{{ . }}</p>
                {{ end }}
                <div class="bg-white rounded-[2rem] border border-slate-100 p-8 md:p-10">
                    <div class="leituras-list">
                        {{ .Content }}
                    </div>
                </div>
            </div>
            {{ end }}
        </div>
    </div>
</section>
{{ end }}
