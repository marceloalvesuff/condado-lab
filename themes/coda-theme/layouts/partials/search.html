<!-- Search Modal -->
<div id="search-modal" class="fixed inset-0 z-[100] hidden" role="dialog" aria-modal="true" aria-label="Buscar no site" data-index="{{ "index.json" | relURL }}">
    <div id="search-backdrop" class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
    <div class="relative max-w-2xl mx-auto mt-20 mx-4 sm:mx-auto px-4">
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-700">
            <!-- Search input -->
            <div class="flex items-center px-5 border-b border-slate-100 dark:border-slate-800">
                <i class="fas fa-search text-slate-300 dark:text-slate-500 mr-3"></i>
                <input
                    id="search-input"
                    type="text"
                    placeholder="Buscar publicações, blog, projetos..."
                    class="w-full py-4 text-base bg-transparent outline-none text-slate-900 dark:text-white placeholder-slate-300 dark:placeholder-slate-500"
                    autocomplete="off"
                >
                <kbd class="hidden sm:inline-flex items-center px-2 py-0.5 text-[10px] font-bold text-slate-300 dark:text-slate-500 border border-slate-200 dark:border-slate-600 rounded">ESC</kbd>
            </div>
            <!-- Results -->
            <div id="search-results" class="max-h-[60vh] overflow-y-auto">
                <div id="search-empty" class="py-12 text-center text-slate-300 dark:text-slate-500 text-sm">
                    Digite para buscar...
                </div>
                <div id="search-list" class="hidden divide-y divide-slate-100 dark:divide-slate-800"></div>
                <div id="search-no-results" class="hidden py-12 text-center text-slate-400 dark:text-slate-500 text-sm">
                    Nenhum resultado encontrado.
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script>
(function () {
    var modal = document.getElementById('search-modal');
    var backdrop = document.getElementById('search-backdrop');
    var input = document.getElementById('search-input');
    var listEl = document.getElementById('search-list');
    var emptyEl = document.getElementById('search-empty');
    var noResultsEl = document.getElementById('search-no-results');
    var fuse = null;
    var indexLoaded = false;

    var sectionLabels = {
        publications: 'Publicação',
        blog: 'Blog',
        projects: 'Pesquisa',
        people: 'Pessoa',
        disciplinas: 'Disciplina',
        leituras: 'Leitura'
    };

    var sectionColors = {
        publications: 'bg-purple-100 text-purple-700 dark:bg-purple-900 dark:text-purple-300',
        blog: 'bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300',
        projects: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900 dark:text-emerald-300',
        people: 'bg-amber-100 text-amber-700 dark:bg-amber-900 dark:text-amber-300',
        disciplinas: 'bg-rose-100 text-rose-700 dark:bg-rose-900 dark:text-rose-300',
        leituras: 'bg-cyan-100 text-cyan-700 dark:bg-cyan-900 dark:text-cyan-300'
    };

    function loadIndex() {
        if (indexLoaded) return Promise.resolve();
        var indexUrl = modal.getAttribute('data-index');
        return fetch(indexUrl)
            .then(function (r) { return r.json(); })
            .then(function (data) {
                fuse = new Fuse(data, {
                    keys: [
                        { name: 'title', weight: 0.4 },
                        { name: 'authors', weight: 0.2 },
                        { name: 'tags', weight: 0.15 },
                        { name: 'description', weight: 0.1 },
                        { name: 'content', weight: 0.1 },
                        { name: 'venue', weight: 0.05 }
                    ],
                    threshold: 0.3,
                    ignoreLocation: true,
                    minMatchCharLength: 2
                });
                indexLoaded = true;
            });
    }

    function openSearch() {
        modal.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
        loadIndex().then(function () {
            input.focus();
        });
    }

    function closeSearch() {
        modal.classList.add('hidden');
        document.body.style.overflow = '';
        input.value = '';
        listEl.classList.add('hidden');
        noResultsEl.classList.add('hidden');
        emptyEl.classList.remove('hidden');
    }

    function renderResults(results) {
        if (!results.length) {
            listEl.classList.add('hidden');
            emptyEl.classList.add('hidden');
            noResultsEl.classList.remove('hidden');
            return;
        }
        noResultsEl.classList.add('hidden');
        emptyEl.classList.add('hidden');
        listEl.classList.remove('hidden');

        listEl.innerHTML = results.slice(0, 20).map(function (r) {
            var item = r.item;
            var section = item.section || '';
            var label = sectionLabels[section] || section;
            var color = sectionColors[section] || 'bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-300';
            var desc = item.description || item.content || '';
            if (desc.length > 120) desc = desc.substring(0, 120) + '...';

            var meta = '';
            if (item.authors) meta = item.authors;
            else if (item.date) meta = item.date;

            return '<a href="' + item.permalink + '" class="block px-5 py-4 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">'
                + '<div class="flex items-start gap-3">'
                + '<span class="inline-block px-2 py-0.5 text-[10px] font-bold uppercase tracking-wider rounded-md mt-0.5 flex-shrink-0 ' + color + '">' + label + '</span>'
                + '<div class="flex-1 min-w-0">'
                + '<p class="text-sm font-semibold text-slate-900 dark:text-white leading-snug">' + escapeHtml(item.title) + '</p>'
                + (meta ? '<p class="text-xs text-slate-400 dark:text-slate-500 mt-0.5">' + escapeHtml(meta) + '</p>' : '')
                + (desc ? '<p class="text-xs text-slate-400 dark:text-slate-500 mt-1 line-clamp-1">' + escapeHtml(desc) + '</p>' : '')
                + '</div>'
                + '<i class="fas fa-chevron-right text-slate-200 dark:text-slate-600 text-xs mt-1 flex-shrink-0"></i>'
                + '</div></a>';
        }).join('');
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    // Event listeners
    var debounceTimer;
    input.addEventListener('input', function () {
        clearTimeout(debounceTimer);
        var query = input.value.trim();
        if (query.length < 2) {
            listEl.classList.add('hidden');
            noResultsEl.classList.add('hidden');
            emptyEl.classList.remove('hidden');
            return;
        }
        debounceTimer = setTimeout(function () {
            if (fuse) {
                renderResults(fuse.search(query));
            }
        }, 150);
    });

    backdrop.addEventListener('click', closeSearch);

    document.addEventListener('keydown', function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            if (modal.classList.contains('hidden')) {
                openSearch();
            } else {
                closeSearch();
            }
        }
        if (e.key === 'Escape' && !modal.classList.contains('hidden')) {
            closeSearch();
        }
    });

    // Expose open function for buttons
    window.openSearch = openSearch;
})();
</script>
