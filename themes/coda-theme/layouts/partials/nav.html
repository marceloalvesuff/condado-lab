<nav class="fixed w-full z-50 bg-purple-600/95 backdrop-blur-xl">
    <div class="max-w-6xl mx-auto px-6">
        <div class="flex justify-between h-20 items-center">
            <a href="{{ .Site.Home.RelPermalink }}" class="flex items-center group">
                <img src="{{ "images/condadolab-logo-principal-branco.png" | relURL }}" alt="Condado Lab" class="h-10 group-hover:opacity-90 transition-opacity">
            </a>

            <div class="hidden md:flex space-x-8">
                {{ range .Site.Menus.main }}
                <a href="{{ .URL | relURL }}"
                   class="nav-link text-sm text-purple-100 font-medium py-1 hover:text-white{{ if $.IsMenuCurrent "main" . }} active{{ end }}">
                    {{ .Name }}
                </a>
                {{ end }}
            </div>

            <div class="hidden md:flex items-center space-x-4">
                <button onclick="openSearch()" class="flex items-center gap-2 text-purple-200 hover:text-white transition-colors text-sm" aria-label="Buscar">
                    <i class="fas fa-search text-xs"></i>
                    <span class="text-purple-300 text-xs border border-purple-400/30 rounded px-1.5 py-0.5">Ctrl K</span>
                </button>
                <button id="dark-toggle" class="text-purple-200 hover:text-white transition-colors" aria-label="Alternar modo escuro">
                    <i class="fas fa-moon" id="dark-toggle-icon"></i>
                </button>
                {{ with .Site.Params.github }}
                <a href="{{ . }}" target="_blank" rel="noopener noreferrer" class="text-purple-200 hover:text-white transition-colors">
                    <i class="fab fa-github text-lg"></i>
                </a>
                {{ end }}
            </div>

            <div class="flex md:hidden items-center space-x-2">
                <button onclick="openSearch()" class="text-white p-2" aria-label="Buscar">
                    <i class="fas fa-search"></i>
                </button>
                <button id="dark-toggle-mobile" class="text-white p-2" aria-label="Alternar modo escuro">
                    <i class="fas fa-moon" id="dark-toggle-icon-mobile"></i>
                </button>
                    <button id="mobile-menu-button" class="text-white p-2" aria-label="Menu" aria-expanded="false">
                    <i class="fas fa-bars" id="mobile-menu-icon"></i>
                </button>
            </div>
        </div>
    </div>
    <div id="mobile-menu" class="hidden md:hidden bg-purple-700 p-8 space-y-6">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}" class="block text-lg font-bold text-purple-100 hover:text-white">{{ .Name }}</a>
        {{ end }}
    </div>
</nav>

<script>
    (function () {
        var btn = document.getElementById('mobile-menu-button');
        var menu = document.getElementById('mobile-menu');
        var icon = document.getElementById('mobile-menu-icon');

        function closeMenu() {
            menu.classList.add('hidden');
            btn.setAttribute('aria-expanded', 'false');
            icon.classList.add('fa-bars');
            icon.classList.remove('fa-times');
        }

        btn.addEventListener('click', function () {
            var isOpen = !menu.classList.contains('hidden');
            menu.classList.toggle('hidden');
            btn.setAttribute('aria-expanded', String(!isOpen));
            icon.classList.toggle('fa-bars', isOpen);
            icon.classList.toggle('fa-times', !isOpen);

            if (!isOpen) {
                var firstLink = menu.querySelector('a');
                if (firstLink) firstLink.focus();
            }
        });

        // Close on Escape
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && !menu.classList.contains('hidden')) {
                closeMenu();
                btn.focus();
            }
        });

        // Trap focus inside mobile menu when open
        menu.addEventListener('keydown', function (e) {
            if (e.key !== 'Tab') return;
            var links = menu.querySelectorAll('a');
            var first = links[0];
            var last = links[links.length - 1];

            if (e.shiftKey && document.activeElement === first) {
                e.preventDefault();
                btn.focus();
            } else if (!e.shiftKey && document.activeElement === last) {
                e.preventDefault();
                btn.focus();
            }
        });
    })();

    // Dark mode toggle (light is default)
    (function () {
        var iconDesktop = document.getElementById('dark-toggle-icon');
        var iconMobile = document.getElementById('dark-toggle-icon-mobile');

        function updateIcons(isDark) {
            [iconDesktop, iconMobile].forEach(function (el) {
                if (!el) return;
                el.classList.toggle('fa-moon', !isDark);
                el.classList.toggle('fa-sun', isDark);
            });
        }

        function toggleDark() {
            var isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateIcons(isDark);
        }

        // Initialize: default to light unless user explicitly chose dark
        var saved = localStorage.getItem('theme');
        if (saved === 'dark') {
            document.documentElement.classList.add('dark');
            updateIcons(true);
        }

        document.getElementById('dark-toggle').addEventListener('click', toggleDark);
        document.getElementById('dark-toggle-mobile').addEventListener('click', toggleDark);
    })();
</script>
