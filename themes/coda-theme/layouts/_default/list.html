{{ define "main" }}
<section class="pt-32 pb-24">
    <div class="max-w-5xl mx-auto px-6">
        <h1 class="text-5xl font-bold mb-6">{{ .Title }}</h1>
        {{ with .Content }}
        <div class="text-xl text-slate-400 font-light mb-20 max-w-2xl leading-relaxed">
            {{ . }}
        </div>
        {{ end }}

        <div class="space-y-8">
            {{ range .Pages }}
            <a href="{{ .RelPermalink }}" class="card-hover block p-8 bg-white rounded-[2rem] border border-slate-100 hover:border-purple-200">
                <h3 class="text-xl font-bold mb-2 group-hover:text-purple-600">{{ .Title }}</h3>
                {{ with .Description }}
                <p class="text-slate-400 text-sm leading-relaxed">{{ . }}</p>
                {{ end }}
                {{ with .Date }}
                <p class="text-[10px] font-bold text-slate-300 uppercase tracking-widest mt-4">{{ .Format "02 Jan 2006" }}</p>
                {{ end }}
            </a>
            {{ end }}
        </div>
    </div>
</section>
{{ end }}
