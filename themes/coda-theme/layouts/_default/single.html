{{ define "main" }}
<article class="pt-32 pb-24">
    <div class="max-w-2xl mx-auto px-6">
        <a href="{{ .Parent.Permalink }}" class="text-slate-300 hover:text-purple-600 text-xs font-bold uppercase tracking-widest mb-12 flex items-center">
            <i class="fas fa-arrow-left mr-3"></i> Voltar para {{ .Parent.Title }}
        </a>

        {{ with .Params.tags }}
        <div class="mb-4 flex flex-wrap gap-2">
            {{ range . }}
            <a href="{{ $.Site.Home.RelPermalink }}tags/{{ . | urlize }}/" class="tag hover:bg-purple-200 dark:hover:bg-purple-800 transition-colors">{{ . }}</a>
            {{ end }}
        </div>
        {{ end }}

        <h1 class="text-4xl md:text-5xl font-bold mb-8 leading-tight">{{ .Title }}</h1>

        <div class="flex items-center space-x-4 mb-12 text-xs">
            {{ with .Params.author }}
            <p class="font-bold text-slate-900">{{ . }}</p>
            <span class="text-slate-200">|</span>
            {{ end }}
            <p class="text-slate-400">{{ partial "pt-date.html" .Date }}</p>
        </div>

        <div class="prose max-w-none">
            {{ .Content }}
        </div>
    </div>
</article>
{{ end }}
